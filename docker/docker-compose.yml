# version: "3.9"

# ── VeriTune local development stack ──────────────────────────────────────────
# Services:
#   veritune    – FastAPI inference server
#   prometheus  – Metrics scraping
#   grafana     – Dashboard (access at http://localhost:3000)
#
# Usage:
#   docker compose up            # start all services
#   docker compose up veritune   # start only the API
#   docker compose down -v       # stop and remove volumes

services:

  veritune:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: veritune:latest
    container_name: veritune_api
    ports:
      - "8000:8000"
    env_file:
      - ../.env.example
    environment:
      - LOG_LEVEL=INFO
      - DEVICE=cpu
      - WORKERS=2
      - ROUTER_PATH=/app/outputs/router
      - REGISTRY_PATH=/app/outputs/checkpoints/checkpoint_registry.json
    volumes:
      - ../outputs:/app/outputs:ro        # mount trained checkpoints read-only
      - ../data/datasets:/app/data/datasets:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: veritune_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
    depends_on:
      - veritune
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.3.0
    container_name: veritune_grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=veritune
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data:
